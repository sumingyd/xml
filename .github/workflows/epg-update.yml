name: EPG Update

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'epg.xml'

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify epg.xml exists
        run: ls -la epg.xml

      - name: Update last modified timestamp
        run: |
          # This step ensures that the workflow runs when epg.xml changes
          # The actual data is loaded dynamically by the webpage
          echo "EPG updated at $(date)" >> epg-last-updated.txt

      - name: Configure git and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add epg-last-updated.txt
          git commit -m "Update EPG timestamp" || echo "No changes to commit"
          git push
