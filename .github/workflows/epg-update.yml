name: EPG Update

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'epg.xml'

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify epg.xml exists
        run: ls -la epg.xml

      - name: Calculate coverage and generate data
        run: |
          python calculate_coverage.py

      - name: Configure git and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add epg_data.json
          git commit -m "Update EPG data" || echo "No changes to commit"
          git push
