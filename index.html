<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPG频道信息</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 30px;
        }
        .header {
            background-color: #343a40;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .btn {
            margin-right: 10px;
        }
        .info-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .table {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .table th {
            background-color: #343a40;
            color: white;
        }
        .alias-list {
            margin: 0;
            padding-left: 20px;
        }
        .alias-list li {
            margin-bottom: 5px;
        }
        .refresh-btn {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>EPG频道信息</h1>
            <div class="mt-3">
                <a href="epg.xml" download class="btn btn-success">下载EPG.xml</a>
                <div class="mt-2">
                    <strong>调用地址：</strong>
                    <code>{{ epgUrl }}</code>
                </div>
            </div>
        </div>
        
        <button class="btn btn-primary refresh-btn" @click="loadEpgData">刷新数据</button>
        
        <div class="info-box">
            <p><strong>更新时间：</strong>{{ updateTime }}</p>
            <p><strong>频道数量：</strong>{{ channels.length }}</p>
        </div>
        
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>频道ID</th>
                    <th>频道名</th>
                    <th>频道别名</th>
                    <th>最后节目时间</th>
                    <th>节目描述覆盖率</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="channel in channels" :key="channel.id">
                    <td>{{ channel.id }}</td>
                    <td>{{ channel.name }}</td>
                    <td>
                        <ul class="alias-list">
                            <li v-for="(alias, index) in channel.aliases" :key="index">{{ alias }}</li>
                        </ul>
                    </td>
                    <td>{{ channel.lastProgramTime }}</td>
                    <td>{{ channel.descriptionCoverage }}%</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <script>
        new Vue({
            el: '#app',
            data: {
                channels: [],
                updateTime: '',
                epgUrl: ''
            },
            mounted() {
                this.epgUrl = window.location.origin + '/epg.xml';
                this.loadEpgData();
                // 每5分钟自动刷新数据
                setInterval(this.loadEpgData, 5 * 60 * 1000);
            },
            methods: {
                loadEpgData() {
                    fetch('epg.xml')
                        .then(response => response.text())
                        .then(xmlText => {
                            const parser = new DOMParser();
                            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                            this.parseEpgData(xmlDoc);
                            this.updateTime = new Date().toLocaleString();
                        })
                        .catch(error => {
                            console.error('Error loading EPG data:', error);
                        });
                },
                parseEpgData(xmlDoc) {
                    const channelElements = xmlDoc.getElementsByTagName('channel');
                    const programmeElements = xmlDoc.getElementsByTagName('programme');
                    
                    // 构建频道数据
                    const channels = [];
                    
                    for (let i = 0; i < channelElements.length; i++) {
                        const channelElement = channelElements[i];
                        const id = channelElement.getAttribute('id');
                        
                        // 获取频道名称和别名
                        const displayNames = channelElement.getElementsByTagName('display-name');
                        const name = displayNames[0] ? displayNames[0].textContent : '';
                        const aliases = [];
                        
                        for (let j = 1; j < displayNames.length; j++) {
                            const alias = displayNames[j].textContent;
                            if (alias && alias !== name) {
                                aliases.push(alias);
                            }
                        }
                        
                        // 查找该频道的所有节目
                        const programmes = [];
                        for (let k = 0; k < programmeElements.length; k++) {
                            const programme = programmeElements[k];
                            if (programme.getAttribute('channel') === id) {
                                programmes.push(programme);
                            }
                        }
                        
                        // 计算最后节目时间
                        let lastProgramTime = '';
                        if (programmes.length > 0) {
                            // 按结束时间排序，取最后一个
                            programmes.sort((a, b) => {
                                const stopA = a.getAttribute('stop');
                                const stopB = b.getAttribute('stop');
                                return stopB.localeCompare(stopA);
                            });
                            lastProgramTime = this.formatTime(programmes[0].getAttribute('stop'));
                        }
                        
                        // 计算节目描述覆盖率
                        let descriptionCoverage = 0;
                        if (programmes.length > 0) {
                            const programmesWithDesc = programmes.filter(p => p.getElementsByTagName('desc').length > 0);
                            descriptionCoverage = Math.round((programmesWithDesc.length / programmes.length) * 100);
                        }
                        
                        channels.push({
                            id,
                            name,
                            aliases,
                            lastProgramTime,
                            descriptionCoverage
                        });
                    }
                    
                    this.channels = channels;
                },
                formatTime(timeStr) {
                    if (!timeStr) return '';
                    // 格式：20260321010000 +0800
                    const year = timeStr.substring(0, 4);
                    const month = timeStr.substring(4, 6);
                    const day = timeStr.substring(6, 8);
                    const hour = timeStr.substring(8, 10);
                    const minute = timeStr.substring(10, 12);
                    return `${year}-${month}-${day} ${hour}:${minute}`;
                }
            }
        });
    </script>
</body>
</html>
